services:
  db:
    image: postgres:17-alpine
    container_name: openmeso-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openmeso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openmeso_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-openmeso}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openmeso}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
