services:
  db:
    image: postgres:17-alpine
    container_name: openmeso-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openmeso}
      # Required — no weak default. Set POSTGRES_PASSWORD in .env (see .env.example).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (set it in .env)}
      POSTGRES_DB: ${POSTGRES_DB:-openmeso}
    ports:
      # Bind to loopback only so Postgres is never exposed on the host's LAN interface.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openmeso}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
