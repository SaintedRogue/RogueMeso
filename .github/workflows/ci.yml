name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Full gate (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npx eslint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

  changelog-guard:
    name: Changelog integrity (What's new feature)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # gen-changelog reads `git log`; the default shallow clone would only see one
          # commit. Full history makes the regeneration check meaningful.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      # Pure-Node guard (no deps) — fails if the "What's new" plumbing has rotted:
      # malformed/missing changelog.json, a gen-script error, a removed Dockerfile COPY,
      # or a dropped lastSeenVersion column/migration.
      - name: Check changelog integrity
        run: npm run check:changelog

  build-push:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    needs: [gate, changelog-guard]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      # Provenance attestation: id-token signs via Sigstore, attestations writes
      # the attestation back to the repo + registry so pulls are verifiable.
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect user-facing (feat/fix) changes
        id: detect
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: echo "build=$(sh scripts/ci-detect-userfacing.sh)" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        if: steps.detect.outputs.build == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Regenerate changelog from git
        if: steps.detect.outputs.build == 'true'
        run: node scripts/gen-changelog.mjs

      - name: Compute short SHA
        if: steps.detect.outputs.build == 'true'
        id: vars
        run: echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.detect.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        if: steps.detect.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.detect.outputs.build == 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/saintedrogue/roguemeso:latest
            ghcr.io/saintedrogue/roguemeso:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Signed provenance: proves this image was built by THIS workflow from THIS
      # commit. Anyone can verify with `gh attestation verify oci://... -R <repo>`
      # or `cosign verify-attestation`. Attaches to the image by digest.
      - name: Attest build provenance
        if: steps.detect.outputs.build == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/saintedrogue/roguemeso
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
